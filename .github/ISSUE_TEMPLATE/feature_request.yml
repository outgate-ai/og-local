name: Feature request
description: Suggest something new.
labels: ["kind/feature"]
body:
  - type: textarea
    id: what
    attributes:
      label: What
      description: What do you want og-local to do?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they don't fit.
