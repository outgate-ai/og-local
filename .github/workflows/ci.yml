name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make lint

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make test-coverage
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && env.CODECOV_TOKEN != ''
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: unit
          fail_ci_if_error: true
      - if: matrix.os == 'ubuntu-latest'
        run: go tool cover -html=coverage.out -o coverage.html
      - if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: coverage.html
          retention-days: 30

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make test-integration
      - name: Upload integration coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-integration.out
          flags: integration
          fail_ci_if_error: true

  detector-build:
    runs-on: ubuntu-latest
    env:
      TOKENIZERS_VERSION: v1.27.0
      ORT_VERSION: 1.26.0
      NATIVE_DIR: ${{ github.workspace }}/.onnxlibs
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Fetch native libraries
        run: |
          mkdir -p "$NATIVE_DIR"
          curl -sL "https://github.com/daulet/tokenizers/releases/download/${TOKENIZERS_VERSION}/libtokenizers.linux-amd64.tar.gz" | tar xz -C "$NATIVE_DIR"
          curl -sL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz" | tar xz -C "$NATIVE_DIR"
      - name: Build onnx-tagged packages
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: -L${{ github.workspace }}/.onnxlibs
        run: go build -tags onnx ./...
      - name: Lint onnx-tagged packages
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: -L${{ github.workspace }}/.onnxlibs
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run --build-tags onnx ./internal/pii/onnx/...

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make build

  release-scripts:
    runs-on: ubuntu-latest
    env:
      TOKENIZERS_VERSION: v1.27.0
      ORT_VERSION: 1.26.0
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: shellcheck scripts/*.sh
      - name: Cache windows tokenizers staticlib
        uses: actions/cache@v4
        with:
          path: native/windows-amd64/libtokenizers.a
          key: tokenizers-${{ env.TOKENIZERS_VERSION }}-x86_64-pc-windows-gnu
      - name: Build release archives end to end
        run: |
          sudo apt-get update && sudo apt-get install -y g++-aarch64-linux-gnu gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64
          ./scripts/stage-native.sh linux/amd64 linux/arm64 windows/amd64
          ./scripts/build-release.sh linux/amd64
          ./scripts/build-release.sh linux/arm64
          ./scripts/build-release.sh windows/amd64
          for arch in amd64 arm64; do
            tar -tzf dist/ogl_*_linux_${arch}.tar.gz | grep -q '^./lib/libonnxruntime.so$'
          done
          unzip -l dist/ogl_*_windows_amd64.zip | grep -q 'ogl.exe'
          unzip -l dist/ogl_*_windows_amd64.zip | grep -q 'lib/onnxruntime.dll'
      - uses: actions/upload-artifact@v4
        with:
          name: windows-onnx-zip
          path: dist/ogl_*_windows_amd64.zip
          retention-days: 1

  windows-smoke:
    needs: release-scripts
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-onnx-zip
      - name: Run the windows binary
        shell: pwsh
        run: |
          Expand-Archive -Path (Get-Item ogl_*_windows_amd64.zip) -DestinationPath extracted
          ./extracted/ogl.exe version
          ./extracted/ogl.exe model list

  commit-lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yaml
          failOnWarnings: true
